<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>238X 專屬 3 班次看板</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e5ea;
            text-align: center;
        }
        .route-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .route-badge {
            background-color: #e1251b;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 4px 18px;
            border-radius: 12px;
            letter-spacing: -1px;
        }
        .direction-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c1c1e;
        }
        .stop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #007aff;
            background: #e1f0ff;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eta-item {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f2f2f7;
        }
        .eta-seq {
            color: #48484a;
            font-size: 0.95rem;
        }
        .eta-time {
            color: #e1251b;
            font-size: 1.2rem;
        }
        .btn-refresh {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .btn-refresh:active { background-color: #0056b3; }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text">往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf-container">
            <div class="loading">正在連線九巴 API...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text">往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-term-container">
            <div class="loading">正在連線九巴 API...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAllETA()">🔄 立即更新班次</button>
    <div class="last-update" id="timestamp">正在獲取數據...</div>
</div>

<script>
    const CONFIG_WONG_CHUK_ST = {
        stopId: "4995BA92A1BB4716", 
        dir: "O",
        container: "eta-wf-container"
    };

    const CONFIG_TERMINUS = {
        stopId: "0E79796033A0372F", 
        dir: "I",
        container: "eta-term-container"
    };

    async function fetchETA(config) {
        const container = document.getElementById(config.container);
        try {
            const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${config.stopId}/238X/${config.dir}`);
            const resData = await response.json();
            
            // 🛠️ 關鍵優化：不再只篩選 item.eta！因為總站未開嘅車只有 rmk_tc（備註）
            let rawData = resData.data || [];

            container.innerHTML = '';

            if (rawData.length === 0) {
                container.innerHTML = '<div class="loading">現時沒有班次資料</div>';
                return;
            }

            // 按照班次序號 (data_seq) 排序，確保頭 3 班依次排列
            rawData.sort((a, b) => a.eta_seq - b.eta_seq);

            // 擷取頭 3 班車
            const upcomingThree = rawData.slice(0, 3);

            upcomingThree.forEach((bus, index) => {
                let displayTime = "-- 分鐘";
                let timeString = "未有資料";

                if (bus.eta) {
                    // 如果已經有即時 GPS 倒數
                    const etaTime = new Date(bus.eta);
                    const now = new Date();
                    const diffMins = Math.max(0, Math.round((etaTime - now) / 1000 / 60));
                    
                    displayTime = diffMins <= 0 ? (config.dir === "I" ? "即將開出" : "即將抵達") : `${diffMins} 分鐘`;
                    timeString = etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                } else if (bus.rmk_tc && bus.rmk_tc.includes("定期班次")) {
                    // 🛠️ 專為起點總站而設：如果未有實時 GPS，直接抓取原定開車時間
                    displayTime = "預定班次";
                    // 抽取文字中的時間，例如從 "定期班次 22:40" 提取 "22:40"
                    timeString = bus.rmk_tc.replace("定期班次 ", "");
                } else if (bus.rmk_tc) {
                    displayTime = bus.rmk_tc;
                    timeString = "---";
                }

                const item = document.createElement('div');
                item.className = 'eta-item';
                item.innerHTML = `
                    <div style="text-align: left;">
                        <span class="eta-seq">下第 ${index + 1} 班車</span>
                        <div style="font-size: 0.8rem; color: #8e8e93; font-weight: normal; margin-top: 2px;">
                            時間: ${timeString}
                        </div>
                    </div>
                    <span class="eta-time" style="${displayTime === '預定班次' ? 'color: #007aff; font-size: 1.1rem;' : ''}">${displayTime}</span>
                `;
                container.appendChild(item);
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="loading" style="color:#ff3b30;">無法獲取資料</div>';
        }
    }

    function refreshAllETA() {
        fetchETA(CONFIG_WONG_CHUK_ST);
        fetchETA(CONFIG_TERMINUS);
        
        const now = new Date();
        document.getElementById('timestamp').innerText = `最後更新: ${now.toLocaleTimeString()}`;
    }

    refreshAllETA();
    setInterval(refreshAllETA, 30000);
</script>

</body>
</html>
