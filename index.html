<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaine 專屬 238X 班次表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container { width: 100%; max-width: 400px; }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e5ea;
            text-align: center;
        }
        .route-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .route-badge {
            background-color: #e1251b;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 4px 18px;
            border-radius: 12px;
        }
        .direction-text { font-size: 1.2rem; font-weight: 700; color: #1c1c1e; text-align: left; }
        .direction-text span { font-size: 0.9rem; color: #8e8e93; font-weight: 500; display: block; }
        .stop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #007aff;
            background: #e1f0ff;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .eta-list { display: flex; flex-direction: column; gap: 10px; }
        .eta-item {
            background: #f8f8fa; border-radius: 12px; padding: 14px 18px; font-size: 1.1rem; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #f2f2f7;
        }
        .eta-seq { color: #48484a; font-size: 0.95rem; }
        .eta-time { color: #e1251b; font-size: 1.2rem; }
        .btn-refresh {
            width: 100%; background-color: #007aff; color: white; border: none; padding: 14px;
            border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
        }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
        .status-bar { text-align: center; font-size: 0.7rem; color: #c7c7cc; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text"><span>💼 返工</span>往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf">
            <div class="loading">正在連線九巴...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text"><span>🏠 收工</span>往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-sh">
            <div class="loading">正在連線九巴...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAll()">🔄 立即更新班次</button>
    <div class="last-update" id="time-tag">準備獲取數據...</div>
    <div class="status-bar" id="status-tag">系統啟動中...</div>
</div>

<script>
    // 🛠️ 官方對應：黃竹街往尖沙咀是 O，中港碼頭往荃灣是 I
    const stopWF = "1EA4E5F522432BD1";
    const stopSH = "0E79796033A0372F";

    function updateCard(url, containerId, isTerminus) {
        const box = document.getElementById(containerId);
        const status = document.getElementById('status-tag');

        fetch(url)
            .then(response => response.json())
            .then(res => {
                const list = res.data ? res.data.filter(b => b.eta) : [];
                box.innerHTML = '';

                if (list.length === 0) {
                    box.innerHTML = '<div class="loading">⌛ 暫無實時班次</div>';
                    return;
                }

                list.sort((a, b) => new Date(a.eta) - new Date(b.eta));
                const topThree = list.slice(0, 3);

                topThree.forEach((bus, i) => {
                    const diff = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
                    let showMins = diff <= 0 ? (isTerminus ? "即將開出" : "即將抵達") : diff + " 分鐘";
                    
                    const div = document.createElement('div');
                    div.className = 'eta-item';
                    div.innerHTML = '<div><span class="eta-seq">下第 ' + (i+1) + ' 班車</span></div><span class="eta-time">' + showMins + '</span>';
                    box.appendChild(div);
                });
                status.innerText = "九巴官方直連成功";
            })
            .catch(err => {
                console.error(err);
                status.innerText = "網絡嘗試中...";
            });
    }

    function refreshAll() {
        updateCard("https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopWF + "/238X/O", "eta-wf", false);
        updateCard("https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopSH + "/238X/I", "eta-sh", true);
        document.getElementById('time-tag').innerText = "最後更新: " + new Date().toLocaleTimeString();
    }

    // 執行
    refreshAll();
    setInterval(refreshAll, 10000);
</script>

</body>
</html>
