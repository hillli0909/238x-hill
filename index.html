<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>238X 專屬 3 班次看板 (官方同步版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e5ea;
            text-align: center;
        }
        .route-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .route-badge {
            background-color: #e1251b;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 4px 18px;
            border-radius: 12px;
            letter-spacing: -1px;
        }
        .direction-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c1c1e;
        }
        .stop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #007aff;
            background: #e1f0ff;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eta-item {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f2f2f7;
        }
        .eta-seq {
            color: #48484a;
            font-size: 0.95rem;
        }
        .eta-time {
            color: #e1251b;
            font-size: 1.2rem;
        }
        .btn-refresh {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .btn-refresh:active { background-color: #0056b3; }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text">往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf-container">
            <div class="loading">正在同步九巴 App 數據...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text">往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-term-container">
            <div class="loading">正在同步九巴 App 數據...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAllETA()">🔄 立即更新班次</button>
    <div class="last-update" id="timestamp">正在獲取數據...</div>
</div>

<script>
    // 🛠️ 升級：切換至 KMB 官方內部 Web API 數據源
    // bound=1 代表去程（往中港碼頭），bound=2 代表回程（往荃灣）
    const CONFIG_WONG_CHUK_ST = {
        bound: "1", 
        stopName: "黃竹街", 
        container: "eta-wf-container"
    };

    const CONFIG_TERMINUS = {
        bound: "2", 
        stopName: "中港碼頭", 
        container: "eta-term-container"
    };

    async function fetchKmbAppETA(config) {
        const container = document.getElementById(config.container);
        try {
            // 🚀 直連九巴官方專用 WebAPI，獲取最高優先級實時預報
            const response = await fetch(`https://webapi.kmb.hk/kmbwebapi/api/v1/Service/GetPriceRouteETA?route=238X&bound=${config.bound}`);
            const resData = await response.json();
            
            // 官方數據結構在 resData.data.response 裡面
            const allStopsData = resData.data && resData.data.response ? resData.data.response : [];
            
            // 篩選出屬於我們指定車站（黃竹街 / 中港碼頭）嘅 ETA 班次
            let stopEtaData = allStopsData.filter(item => item.StopNameCH.includes(config.stopName));

            container.innerHTML = '';

            if (stopEtaData.length === 0) {
                container.innerHTML = '<div class="loading">現時沒有班次資料</div>';
                return;
            }

            // 擷取前 3 班最快到站/開出嘅班次 (Upcoming 3)
            const upcomingThree = stopEtaData.slice(0, 3);

            upcomingThree.forEach((bus, index) => {
                // 官方內部 API 欄位：Value 代表「倒數分鐘或狀態文字」，ExTime 代表「預計到站時間」
                let displayTime = bus.Value || "-- 分鐘";
                let timeString = bus.ExTime ? bus.ExTime.substring(0, 5) : "---"; // 簡化成 22:45 格式

                // 美化即將到站或開出嘅字眼
                if (displayTime.includes("即將")) {
                    displayTime = config.bound === "2" ? "即將開出" : "即將抵達";
                }

                const item = document.createElement('div');
                item.className = 'eta-item';
                item.innerHTML = `
                    <div style="text-align: left;">
                        <span class="eta-seq">下第 ${index + 1} 班車</span>
                        <div style="font-size: 0.8rem; color: #8e8e93; font-weight: normal; margin-top: 2px;">
                            時間: ${timeString}
                        </div>
                    </div>
                    <span class="eta-time" style="${displayTime.includes('預定') ? 'color: #007aff; font-size: 1.1rem;' : ''}">${displayTime}</span>
                `;
                container.appendChild(item);
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="loading" style="color:#ff3b30;">無法獲取資料</div>';
        }
    }

    function refreshAllETA() {
        fetchKmbAppETA(CONFIG_WONG_CHUK_ST);
        fetchKmbAppETA(CONFIG_TERMINUS);
        
        const now = new Date();
        document.getElementById('timestamp').innerText = `最後更新: ${now.toLocaleTimeString()}`;
    }

    // 初次載入與全自動每 30 秒更新
    refreshAllETA();
    setInterval(refreshAllETA
