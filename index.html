<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaine 專屬 238X 班次表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7; color: #1c1c1e; padding: 20px 15px;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center;
        }
        .container { width: 100%; max-width: 400px; }
        .card {
            background: #ffffff; border-radius: 24px; padding: 25px; margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05); border: 1px solid #e5e5ea; text-align: center;
        }
        .route-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .route-badge {
            background-color: #e1251b; color: white; font-size: 2.2rem; font-weight: 900;
            padding: 4px 18px; border-radius: 12px;
        }
        .direction-text { font-size: 1.2rem; font-weight: 700; color: #1c1c1e; text-align: left; }
        .direction-text span { font-size: 0.9rem; color: #8e8e93; font-weight: 500; display: block; }
        .stop-name {
            font-size: 1.05rem; font-weight: 600; color: #007aff; background: #e1f0ff;
            padding: 6px 12px; border-radius: 20px; display: inline-block; margin-bottom: 15px;
        }
        .eta-list { display: flex; flex-direction: column; gap: 10px; }
        .eta-item {
            background: #f8f8fa; border-radius: 12px; padding: 14px 18px; font-size: 1.1rem; font-weight: 700;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #f2f2f7;
        }
        .eta-seq { color: #48484a; font-size: 0.95rem; }
        .eta-time { color: #e1251b; font-size: 1.2rem; }
        .btn-refresh {
            width: 100%; background-color: #007aff; color: white; border: none; padding: 14px;
            border-radius: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer;
        }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
        .status-bar { text-align: center; font-size: 0.7rem; color: #c7c7cc; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text"><span>💼 返工</span>往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf">
            <div class="loading">正在獲取實時班次...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text"><span>🏠 收工</span>往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-sh">
            <div class="loading">正在獲取實時班次...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAll()">🔄 立即更新班次</button>
    <div class="last-update" id="time-tag">準備獲取數據...</div>
    <div class="status-bar" id="status-tag">系統啟動中...</div>
</div>

<script>
    const stopWF = "833DE523F16B97C3"; // 黃竹街專屬 ID
    const stopSH = "0E79796033A0372F"; // 中港碼頭

    function renderList(list, box, isTerminus) {
        box.innerHTML = '';
        list.sort((a, b) => new Date(a.eta) - new Date(b.eta));
        const topThree = list.slice(0, 3);

        topThree.forEach((bus, i) => {
            const diff = Math.max(0, Math.round((new Date(bus.eta) - new Date()) / 60000));
            let showMins = diff <= 0 ? (isTerminus ? "即將開出" : "即將抵達") : diff + " 分鐘";
            const div = document.createElement('div');
            div.className = 'eta-item';
            div.innerHTML = '<div><span class="eta-seq">下第 ' + (i+1) + ' 班車</span></div><span class="eta-time">' + showMins + '</span>';
            box.appendChild(div);
        });
    }

    function updateWongChukStreet() {
        const box = document.getElementById('eta-wf');
        const status = document.getElementById('status-tag');
        
        // 🚀 第一保險：先衝單站 API
        fetch("https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopWF + "/238X/O")
            .then(r => r.json())
            .then(res => {
                let list = res.data ? res.data.filter(b => b.eta) : [];
                
                // 💡 如果單站 API 吐出空數據，立刻觸活動態過濾第二保險！
                if (list.length === 0) {
                    status.innerText = "觸發全線雷達追蹤...";
                    fetch("https://data.etabus.gov.hk/v1/transport/kmb/route-eta/238X")
                        .then(r => r.json())
                        .then(routeRes => {
                            let allData = routeRes.data || [];
                            // 用精準的黃竹街專屬 ID 進行本地篩選
                            let filtered = allData.filter(b => b.dir === "O" && b.stop === stopWF && b.eta);
                            
                            if (filtered.length === 0) {
                                box.innerHTML = '<div class="loading">⌛ 暫無實時班次 (尾班車已過)</div>';
                                status.innerText = "九巴確認現時無班次";
                            } else {
                                renderList(filtered, box, false);
                                status.innerText = "透過全線雷達直連成功";
                            }
                        });
                } else {
                    renderList(list, box, false);
                    status.innerText = "九巴單站直連成功";
                }
            })
            .catch(err => {
                status.innerText = "連線重試中...";
            });
    }

    function updateTerminus() {
        const box = document.getElementById('eta-sh');
        fetch("https://data.etabus.gov.hk/v1/transport/kmb/eta/" + stopSH + "/238X/I")
            .then(r => r.json())
            .then(res => {
                const list = res.data ? res.data.filter(b => b.eta) : [];
                if (list.length === 0) {
                    box.innerHTML = '<div class="loading">⌛ 暫無實時班次</div>';
                    return;
                }
                renderList(list, box, true);
            });
    }

    function refreshAll() {
        updateWongChukStreet();
        updateTerminus();
        document.getElementById('time-tag').innerText = "最後更新: " + new Date().toLocaleTimeString();
    }

    refreshAll();
    setInterval(refreshAll, 10000);
</script>

</body>
</html>
