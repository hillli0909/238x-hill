<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaine專屬238X班次表</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e5ea;
            text-align: center;
        }
        .route-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .route-badge {
            background-color: #e1251b;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 4px 18px;
            border-radius: 12px;
            letter-spacing: -1px;
        }
        .direction-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c1c1e;
        }
        .stop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #007aff;
            background: #e1f0ff;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eta-item {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f2f2f7;
        }
        .eta-seq {
            color: #48484a;
            font-size: 0.95rem;
        }
        .eta-time {
            color: #e1251b;
            font-size: 1.2rem;
        }
        .btn-refresh {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .btn-refresh:active { background-color: #0056b3; }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text">（返工）往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf-container">
            <div class="loading">正在獲取實時班次...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text">（收工）往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-term-container">
            <div class="loading">正在獲取實時班次...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAllETA()">🔄 立即更新班次</button>
    <div class="last-update" id="timestamp">正在獲取數據...</div>
</div>

<script>
    const CONFIG_WONG_CHUK_ST = {
        stopId: "4995BA92A1BB4716", 
        dir: "O",
        container: "eta-wf-container",
        isTerminus: false
    };

    const CONFIG_TERMINUS = {
        stopId: "0E79796033A0372F", 
        dir: "I",
        container: "eta-term-container",
        isTerminus: true
    };

    // 🛠️ 建立一個帶有時間限制的 fetch 函數（3秒沒回應就當作超時）
    async function fetchWithTimeout(resource, options = {}) {
        const { timeout = 3000 } = options;
        const controller = new AbController();
        const id = setTimeout(() => controller.abort(), timeout);
        const response = await fetch(resource, {
            ...options,
            signal: controller.signal  
        });
        clearTimeout(id);
        return response;
    }

    async function fetchETA(config) {
        const container = document.getElementById(config.container);
        try {
            // 使用新寫的超時機制，避免九巴伺服器裝死導致網頁無限 Loading
            const response = await fetchWithTimeout(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${config.stopId}/238X/${config.dir}`, { timeout: 3000 });
            const resData = await response.json();
            
            let filteredData = resData.data ? resData.data.filter(item => item.eta) : [];

            container.innerHTML = '';

            if (filteredData.length === 0) {
                container.innerHTML = '<div class="loading" style="color:#8e8e93; font-style: normal;">⌛ 暫無實時班次 (尾班車已過/暫未開出)</div>';
                return;
            }

            filteredData.sort((a, b) => new Date(a.eta) - new Date(b.eta));
            const upcomingThree = filteredData.slice(0, 3);

            upcomingThree.forEach((bus, index) => {
                const etaTime = new Date(bus.eta);
                const now = new Date();
                const diffMins = Math.max(0, Math.round((etaTime - now) / 1000 / 60));
                
                let displayTime = diffMins <= 0 ? (config.isTerminus ? "即將開出" : "即將抵達") : `${diffMins} 分鐘`;
                const timeString = etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                let remarkText = `預計: ${timeString}`;
                if (bus.rmk_tc && bus.rmk_tc.includes("定期班次")) {
                    remarkText = `原定開出: ${bus.rmk_tc.replace("定期班次 ", "")}`;
                }

                const item = document.createElement('div');
                item.className = 'eta-item';
                item.innerHTML = `
                    <div style="text-align: left;">
                        <span class="eta-seq">下第 ${index + 1} 班車</span>
                        <div style="font-size: 0.8rem; color: #8e8e93; font-weight: normal; margin-top: 2px;">
                            ${remarkText}
                        </div>
                    </div>
                    <span class="eta-time">${displayTime}</span>
                `;
                container.appendChild(item);
            });

        } catch (error) {
            console.error(error);
            // 🛠️ 只要斷線、超時或發生任何錯誤，立刻跳轉顯示，絕不卡死
            container.innerHTML = '<div class="loading" style="color:#8e8e93; font-style: normal;">⌛ 暫無實時班次 (請稍後更新)</div>';
        }
    }

    function refreshAllETA() {
        fetchETA(CONFIG_WONG_CHUK_ST);
        fetchETA(CONFIG_TERMINUS);
        
        const now = new Date();
        document.getElementById('timestamp').innerText = `最後更新: ${now.toLocaleTimeString()}`;
    }

    refreshAllETA();
    setInterval(refreshAllETA, 30000);
</script>

</body>
</html>
