<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>238X 專屬 3 班次看板 (倒數補底版)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #f2f2f7;
            color: #1c1c1e;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .card {
            background: #ffffff;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e5ea;
            text-align: center;
        }
        .route-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .route-badge {
            background-color: #e1251b;
            color: white;
            font-size: 2.2rem;
            font-weight: 900;
            padding: 4px 18px;
            border-radius: 12px;
            letter-spacing: -1px;
        }
        .direction-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1c1c1e;
        }
        .stop-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #007aff;
            background: #e1f0ff;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
        }
        .eta-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .eta-item {
            background: #f8f8fa;
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 1.1rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #f2f2f7;
        }
        .eta-seq {
            color: #48484a;
            font-size: 0.95rem;
        }
        .eta-time {
            color: #e1251b;
            font-size: 1.2rem;
        }
        .btn-refresh {
            width: 100%;
            background-color: #007aff;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2);
        }
        .btn-refresh:active { background-color: #0056b3; }
        .last-update { text-align: center; font-size: 0.8rem; color: #aeaeae; margin-top: 15px; }
        .loading { color: #8e8e93; text-align: center; padding: 15px 0; font-style: italic; }
    </style>
</head>
<body>

<div class="container">

    <div class="card">
        <div class="route-header">
            <div class="route-badge">238X</div>
            <div class="direction-text">往 尖沙咀／中港碼頭</div>
        </div>
        <div class="stop-name">📍 上車站：深水埗黃竹街</div>
        <div class="eta-list" id="eta-wf-container">
            <div class="loading">正在連線獲取班次...</div>
        </div>
    </div>

    <div class="card">
        <div class="route-header">
            <div class="route-badge" style="background-color: #48484a;">238X</div>
            <div class="direction-text">往 荃灣海濱花園</div>
        </div>
        <div class="stop-name" style="color: #48484a; background: #e5e5ea;">開出站：中港碼頭總站</div>
        <div class="eta-list" id="eta-term-container">
            <div class="loading">正在連線獲取班次...</div>
        </div>
    </div>

    <button class="btn-refresh" onclick="refreshAllETA()">🔄 立即更新班次</button>
    <div class="last-update" id="timestamp">正在獲取數據...</div>
</div>

<script>
    const CONFIG_WONG_CHUK_ST = {
        stopId: "4995BA92A1BB4716", 
        dir: "O",
        container: "eta-wf-container",
        isTerminus: false
    };

    const CONFIG_TERMINUS = {
        stopId: "0E79796033A0372F", 
        dir: "I",
        container: "eta-term-container",
        isTerminus: true
    };

    // 238X 深夜固定時間表
    const TIMETABLE_TERMINUS_TO_TSUEN_WAN = {
        22: [0, 15, 30, 45],
        23: [0, 15, 30, 40]
    };
    const TIMETABLE_WONG_CHUK_ST_TO_TSIM_SHA_TSUI = {
        22: [10, 25, 40, 55],
        23: [10, 25, 40, 55]
    };

    function getFallbackSchedules(isTerminus) {
        const now = new Date();
        const currentHour = now.getHours();
        const currentMin = now.getMinutes();
        const timetable = isTerminus ? TIMETABLE_TERMINUS_TO_TSUEN_WAN : TIMETABLE_WONG_CHUK_ST_TO_TSIM_SHA_TSUI;
        
        let futureBuses = [];

        [currentHour, currentHour + 1].forEach(hour => {
            if (timetable[hour]) {
                timetable[hour].forEach(min => {
                    const busTime = new Date();
                    busTime.setHours(hour, min, 0, 0);
                    
                    if (busTime > now) {
                        const diffMins = Math.round((busTime - now) / 1000 / 60);
                        futureBuses.push({
                            timeStr: `${String(hour).padStart(2, '0')}:${String(min).padStart(2, '0')}`,
                            countdown: diffMins
                        });
                    }
                });
            }
        });

        return futureBuses.slice(0, 3);
    }

    async function fetchETA(config) {
        const container = document.getElementById(config.container);
        try {
            const response = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/eta/${config.stopId}/238X/${config.dir}`);
            const resData = await response.json();
            
            let filteredData = resData.data ? resData.data.filter(item => item.eta) : [];

            container.innerHTML = '';

            // 當 API 沒有實時數據時，啟動時間表並轉化為「XX 分鐘」顯示
            if (filteredData.length === 0) {
                const fallbackBuses = getFallbackSchedules(config.isTerminus);
                
                if (fallbackBuses.length === 0) {
                    container.innerHTML = '<div class="loading">服務時間已過 / 暫無班次</div>';
                    return;
                }

                fallbackBuses.forEach((bus, index) => {
                    const item = document.createElement('div');
                    item.className = 'eta-item';
                    item.innerHTML = `
                        <div style="text-align: left;">
                            <span class="eta-seq">下第 ${index + 1} 班車</span>
                            <div style="font-size: 0.8rem; color: #007aff; font-weight: normal; margin-top: 2px;">
                                時間: ${bus.timeStr} (預定)
                            </div>
                        </div>
                        <span class="eta-time">${bus.countdown} 分鐘</span>
                    `;
                    container.appendChild(item);
                });
                return;
            }

            // 正常實時 GPS 數據顯示
            filteredData.sort((a, b) => new Date(a.eta) - new Date(b.eta));
            const upcomingThree = filteredData.slice(0, 3);

            upcomingThree.forEach((bus, index) => {
                const etaTime = new Date(bus.eta);
                const now = new Date();
                const diffMins = Math.max(0, Math.round((etaTime - now) / 1000 / 60));
                
                let displayTime = diffMins <= 0 ? (config.isTerminus ? "即將開出" : "即將抵達") : `${diffMins} 分鐘`;
                const timeString = etaTime.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                const item = document.createElement('div');
                item.className = 'eta-item';
                item.innerHTML = `
                    <div style="text-align: left;">
                        <span class="eta-seq">下第 ${index + 1} 班車</span>
                        <div style="font-size: 0.8rem; color: #8e8e93; font-weight: normal; margin-top: 2px;">
                            預計: ${timeString}
                        </div>
                    </div>
                    <span class="eta-time">${displayTime}</span>
                `;
                container.appendChild(item);
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = '<div class="loading" style="color:#ff3b30;">無法獲取資料</div>';
        }
    }

    function refreshAllETA() {
        fetchETA(CONFIG_WONG_CHUK_ST);
        fetchETA(CONFIG_TERMINUS);
        
        const now = new Date();
        document.getElementById('timestamp').innerText = `最後更新: ${now.toLocaleTimeString()}`;
    }

    refreshAllETA();
    setInterval(refreshAllETA, 30000);
</script>

</body>
</html>
